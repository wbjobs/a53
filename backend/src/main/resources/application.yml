server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/museum_relic
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

app:
  jwt:
    secret: museum-relic-restoration-secret-key-for-jwt-token-must-be-at-least-256-bits-long
    expiration-ms: 86400000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: relic-photos
